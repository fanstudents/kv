name: Daily Team Lead Report

on:
  schedule:
    # 01:00 UTC = 台北時間 09:00
    - cron: "0 1 * * *"
  workflow_dispatch: {}

jobs:
  trigger-report:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger team lead daily report
        run: |
          curl -fsS --max-time 120 \
            -H "x-cron-key: ${{ secrets.CRON_SECRET }}" \
            "https://kva.zeabur.app/api/cron/team-lead-report"
